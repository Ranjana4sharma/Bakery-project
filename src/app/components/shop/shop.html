<!-- shop.html -->
<div class="shop-container">
  <aside class="sidebar">
    <h3>Categories</h3>
    <ul>
      <li [class.active]="selectedCategory === 'All'" (click)="selectCategory('All')">All</li>
      <li
        *ngFor="let cat of categories"
        [class.active]="selectedCategory === cat.name"
        (click)="selectCategory(cat.name)"
      >
        {{ cat.name }}
      </li>
    </ul>

    <label>Sort By</label>
    <select [(ngModel)]="sortBy" (change)="applyFilters()">
      <option value="none">None</option>
      <option value="priceLowHigh">Price: Low to High</option>
      <option value="priceHighLow">Price: High to Low</option>
    </select>

    <input
      type="text"
      placeholder="Search bakery items..."
      [(ngModel)]="searchTerm"
      (input)="applyFilters()"
    />
  </aside>

  <main class="products-grid">
    <div
      *ngFor="let product of filteredProducts; let i = index"
      class="product-card"
      (click)="openProductDetails(product.id)"
    >
      <img [src]="product.imageUrl" [alt]="product.name" />
      <h4>{{ product.name }}</h4>
      <p>💰 ₹{{ product.price }}</p>
      <p 
        class="description"
        [class.expanded]="expanded[i]"
        (click)="$event.stopPropagation()"
      >
        {{ product.description }}
      </p>
      <button
        *ngIf="isDescriptionLong(product.description)"
        class="toggle-btn"
        (click)="toggleDescription(i); $event.stopPropagation()"
        type="button"
      >
        {{ expanded[i] ? 'Show less' : 'Read more' }}
      </button>
    </div>
  </main>
</div>
